# ===========================================
# CLIENT CONFIGURATION FILES
# ===========================================

# ===========================================
# ANDROID CLIENT (android.conf)
# ===========================================
# Use: Import via WireGuard Android app or QR code
# QR Code: Run 'qrencode -t ansiutf8 < android.conf' on server

[Interface]
PrivateKey = ANDROID_PRIVATE_KEY
Address = 10.0.0.2/24
DNS = 1.1.1.1, 8.8.8.8

[Peer]
PublicKey = SERVER_PUBLIC_KEY
Endpoint = YOUR_PUBLIC_IP_OR_DOMAIN:51820
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25


# ===========================================
# IOS CLIENT (ios.conf)
# ===========================================
# Use: Import via WireGuard iOS app or generate QR code
# Generate QR: qrencode -t ansiutf8 < ios.conf

[Interface]
PrivateKey = IOS_PRIVATE_KEY
Address = 10.0.0.3/24
DNS = 1.1.1.1, 8.8.8.8

[Peer]
PublicKey = SERVER_PUBLIC_KEY
Endpoint = YOUR_PUBLIC_IP_OR_DOMAIN:51820
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25


# ===========================================
# WINDOWS CLIENT (windows.conf)
# ===========================================
# Use: Import via WireGuard Windows client
# Download: https://www.wireguard.com/install/

[Interface]
PrivateKey = WINDOWS_PRIVATE_KEY
Address = 10.0.0.4/24
DNS = 1.1.1.1, 8.8.8.8

[Peer]
PublicKey = SERVER_PUBLIC_KEY
Endpoint = YOUR_PUBLIC_IP_OR_DOMAIN:51820
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25


# ===========================================
# FIELD DESCRIPTIONS:
# ===========================================
# PrivateKey  - Client's private key (keep secret!)
# Address     - Client's IP in VPN network
# DNS         - DNS servers to use (Cloudflare/Google)
# Endpoint    - Your server's public IP or domain + port
# AllowedIPs  - 0.0.0.0/0 = route ALL traffic through VPN
#             - For split tunnel, use specific subnets
# PersistentKeepalive - Keep NAT connection alive (seconds)


# ===========================================
# IMPORT INSTRUCTIONS:
# ===========================================
#
# ANDROID:
#   1. Install WireGuard from Google Play
#   2. Tap (+) -> Import from file or scan QR
#   3. Enable VPN
#
# IOS:
#   1. Install WireGuard from App Store
#   2. Import config via Files or QR code
#   3. Activate VPN
#
# WINDOWS:
#   1. Install WireGuard from wireguard.com
#   2. Import tunnel configuration
#   3. Click Activate