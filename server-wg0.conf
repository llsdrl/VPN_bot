# ===========================================
# SERVER CONFIGURATION EXAMPLE (wg0.conf)
# ===========================================
# Generated after running install-wireguard.sh
# Location: /etc/wireguard/wg0.conf

[Interface]
# Server's private key (generated automatically)
PrivateKey = SERVER_PRIVATE_KEY_HERE
# VPN network address
Address = 10.0.0.1/24
# WireGuard listening port
ListenPort = 51820

# NAT and forwarding rules (auto-configured by script)
PostUp = iptables -A FORWARD -i wg0 -j ACCEPT
PostUp = iptables -A FORWARD -o wg0 -j ACCEPT
PostUp = iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE

PostDown = iptables -D FORWARD -i wg0 -j ACCEPT
PostDown = iptables -D FORWARD -o wg0 -j ACCEPT
PostDown = iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# ===========================================
# CLIENTS (Peers) - Add for each client
# ===========================================

# Android Client
[Peer]
PublicKey = ANDROID_CLIENT_PUBLIC_KEY
AllowedIPs = 10.0.0.2/32
PersistentKeepalive = 25

# iOS Client
[Peer]
PublicKey = IOS_CLIENT_PUBLIC_KEY
AllowedIPs = 10.0.0.3/32
PersistentKeepalive = 25

# Windows Client
[Peer]
PublicKey = WINDOWS_CLIENT_PUBLIC_KEY
AllowedIPs = 10.0.0.4/32
PersistentKeepalive = 25

# ===========================================
# SECURITY NOTES:
# ===========================================
# - chmod 600 /etc/wireguard/wg0.conf
# - Keep private keys secure
# - Use unique IP for each peer
# - PersistentKeepalive = 25 (keep NAT alive)